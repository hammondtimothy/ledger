<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ledger</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232f29;
    --ink-soft:#4a564f;
    --paper:#eae6d9;
    --paper-raised:#f3f0e6;
    --paper-line: rgba(35,47,41,0.12);
    --teal:#2f6f62;
    --teal-dark:#1f4d43;
    --tim:#3e5c76;
    --tim-soft:#e4eaf0;
    --wendy:#8c4a5b;
    --wendy-soft:#f2e5e8;
    --owe:#b5562b;
    --owed:#2f6f62;
    --danger:#b5562b;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(35,47,41,0.08), 0 4px 14px rgba(35,47,41,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Public Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  #app{
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--paper);
    display:flex;
    flex-direction:column;
    padding-bottom: 84px;
  }
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight:600;
    margin:0;
    color: var(--ink);
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  .topbar{
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--paper-line);
    display:flex; align-items:center; justify-content:space-between;
    position: sticky; top:0; background: var(--paper); z-index: 20;
  }
  .brand{ display:flex; align-items:baseline; gap:8px; }
  .brand h1{ font-size:22px; letter-spacing:-0.01em; }
  .brand .tag{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); }
  .person-pill{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    padding:5px 10px;
    border-radius: 999px;
    border:1px solid var(--paper-line);
    background: var(--paper-raised);
    display:flex; align-items:center; gap:6px;
    cursor:pointer;
  }
  .dot{ width:8px; height:8px; border-radius:50%; }
  .content{ flex:1; padding: 18px 20px 0; }
  .screen-title{ font-size:26px; margin-bottom:4px; }
  .screen-sub{ color:var(--ink-soft); font-size:14px; margin-bottom:18px; }

  .card{
    background: var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom:14px;
    box-shadow: var(--shadow);
  }
  .card.tappable{ cursor:pointer; transition: transform .12s ease; }
  .card.tappable:active{ transform: scale(0.985); }

  .btn{
    font-family:'Public Sans', sans-serif;
    font-weight:600;
    font-size:14px;
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    transition: opacity .12s ease;
  }
  .btn:active{ opacity:0.8; }
  .btn-primary{ background: var(--ink); color: var(--paper); }
  .btn-secondary{ background: transparent; color: var(--ink); border:1px solid var(--paper-line); }
  .btn-block{ width:100%; }
  .btn-danger{ background: var(--danger); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--ink-soft); font-weight:500; }

  label{ font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); display:block; margin-bottom:6px; }
  input[type=text], input[type=number], input[type=date], select, textarea{
    width:100%;
    font-family:'Public Sans', sans-serif;
    font-size:16px;
    padding: 11px 12px;
    border-radius:8px;
    border: 1px solid var(--paper-line);
    background: #fff;
    color: var(--ink);
    margin-bottom:14px;
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--teal); outline-offset:1px; }
  .field-row{ display:flex; gap:10px; }
  .field-row > div{ flex:1; }

  .toggle-group{ display:flex; border:1px solid var(--paper-line); border-radius:8px; overflow:hidden; margin-bottom:14px; }
  .toggle-opt{ flex:1; text-align:center; padding:10px; font-size:13px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink-soft); }
  .toggle-opt.active{ background: var(--ink); color: var(--paper); }

  .chip{
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 11px; border-radius:999px; font-size:12px; font-weight:600;
    border:1px solid var(--paper-line); background:#fff; cursor:pointer; margin:0 6px 6px 0;
  }
  .chip.selected{ background: var(--teal); color:#fff; border-color: var(--teal); }

  .error-box{ background:#fbe9e2; border:1px solid var(--owe); color:#7a3517; padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:14px; }
  .hint{ font-size:12px; color:var(--ink-soft); margin:-8px 0 14px; }

  .row-between{ display:flex; align-items:center; justify-content:space-between; }

  .nav{
    position: fixed; bottom:0; left:0; right:0;
    background: var(--paper-raised); border-top:1px solid var(--paper-line);
    display:flex; max-width:560px; margin:0 auto;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index:30;
  }
  .nav-item{
    flex:1; text-align:center; padding:11px 4px 9px; cursor:pointer;
    font-size:11px; font-weight:600; color:var(--ink-soft); letter-spacing:0.02em;
    border-top:2px solid transparent;
  }
  .nav-item.active{ color: var(--ink); border-top-color: var(--teal); }

  .empty{ text-align:center; padding: 40px 20px; color: var(--ink-soft); }
  .empty h3{ color:var(--ink); margin-bottom:6px; font-size:18px; }

  .entry-row{ display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--paper-line); }
  .entry-row:last-child{ border-bottom:none; }
  .entry-left{ flex:1; padding-right:10px; }
  .entry-date{ font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; }
  .entry-meta{ font-size:13px; color:var(--ink-soft); margin-top:2px; }
  .entry-amount{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px; white-space:nowrap; }
  .badge{ font-size:10px; font-weight:700; text-transform:uppercase; padding:2px 6px; border-radius:4px; letter-spacing:0.03em; }

  .tape{
    background: #f8f6ee;
    border-radius: 4px;
    padding: 6px 4px 14px;
    position:relative;
    box-shadow: var(--shadow);
    margin-bottom:16px;
  }
  .tape:before{
    content:"";
    display:block;
    height:8px;
    background: repeating-linear-gradient(90deg, transparent, transparent 6px, var(--paper) 6px, var(--paper) 10px);
  }
  .tape-row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 9px 14px; cursor:pointer; border-bottom:1px dashed var(--paper-line);
  }
  .tape-row:hover{ background: rgba(47,111,98,0.06); }
  .tape-cat{ font-size:14px; font-weight:600; }
  .tape-amt{ font-family:'IBM Plex Mono',monospace; font-size:14px; }
  .tape-total{ display:flex; justify-content:space-between; padding:12px 14px 4px; font-weight:700; }

  table.summary-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.summary-table th{ text-align:right; font-size:10px; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); padding-bottom:8px; font-weight:600; }
  table.summary-table th:first-child, table.summary-table td:first-child{ text-align:left; }
  table.summary-table td{ text-align:right; padding:8px 0; font-family:'IBM Plex Mono',monospace; border-top:1px solid var(--paper-line); }
  table.summary-table td.name{ font-family:'Public Sans',sans-serif; font-weight:600; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(35,47,41,0.5); z-index:50; display:flex; align-items:flex-end; }
  .modal{ background:var(--paper); width:100%; max-width:560px; margin:0 auto; border-radius:16px 16px 0 0; padding:20px; max-height:80vh; overflow-y:auto; }
  .modal-handle{ width:36px; height:4px; background:var(--paper-line); border-radius:2px; margin:0 auto 14px; }

  .link-btn{ background:none; border:none; color:var(--teal-dark); font-weight:600; font-size:13px; cursor:pointer; padding:0; }

  .conn-dot{ width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; }
  ::selection{ background: var(--teal); color:#fff; }
</style>
</head>
<body>
<div id="app"><div class="content"><p class="hint">Connecting…</p></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* ---------------- Firebase config (this project's public web config — safe to keep in client code) ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCaUw8ka6WD083g10s-mKc1l0Z2uWYgM_w",
  authDomain: "tim-wendy-ledger.firebaseapp.com",
  projectId: "tim-wendy-ledger",
  storageBucket: "tim-wendy-ledger.firebasestorage.app",
  messagingSenderId: "818724375401",
  appId: "1:818724375401:web:be09ef701af89568c18bf8"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

const PRESETS = {
  Holiday: ['Hotel','Flights','Eating/drinking out','Shopping','Parking','Car hire','Petrol','Other'],
  'DIY project': ['Materials','Tools','Labour','Delivery','Other'],
  'Car maintenance': ['Parts','Labour','MOT/Service','Insurance','Fuel','Other'],
  'Start blank': ['Other']
};
const PEOPLE_ALL = ['Tim','Wendy'];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function money(n){ const v = Number(n)||0; return (v<0?'-£':'£') + Math.abs(v).toFixed(2); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function round2(n){ return Math.round((n+Number.EPSILON)*100)/100; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let state = {
  connected:false,
  currentPerson: localStorage.getItem('ledger_person') || null,
  projects: [],
  currentProjectId: null,
  entries: [],
  screen: 'personPicker',
  tab: 'entry',
  editingEntryId: null,
  form: {},
  errors: {},
  drilldownCategory: null,
  confirmDelete: null,
};
if(state.currentPerson) state.screen = 'projectList';

let projectsUnsub = null;
let entriesUnsub = null;

onAuthStateChanged(auth, (user)=>{
  if(user){
    state.connected = true;
    attachProjectsListener();
    render();
  }
});
signInAnonymously(auth).catch(err=>{
  console.error('Firebase auth failed', err);
  document.getElementById('app').innerHTML = '<div class="content"><div class="error-box">Could not connect to the database. Check your connection and reload.</div></div>';
});

function attachProjectsListener(){
  if(projectsUnsub) projectsUnsub();
  projectsUnsub = onSnapshot(collection(db,'projects'), (snap)=>{
    state.projects = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  }, (err)=>{ console.error('projects listener error', err); });
}
function attachEntriesListener(projectId){
  if(entriesUnsub) entriesUnsub();
  const q = query(collection(db,'projects',projectId,'entries'), orderBy('createdAtMs','desc'));
  entriesUnsub = onSnapshot(q, (snap)=>{
    state.entries = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  }, (err)=>{ console.error('entries listener error', err); });
}

/* ---------------- derived helpers ---------------- */
function currentProject(){ return state.projects.find(p=>p.id===state.currentProjectId); }
function visibleProjects(){ return state.projects.filter(p=>p.people.includes(state.currentPerson)); }

function calcBalances(project, entries){
  const people = project.people;
  const bal = {};
  people.forEach(p=>bal[p] = {paid:0, given:0, received:0});
  entries.forEach(e=>{
    if(e.type==='spend'){
      if(bal[e.paidBy]) bal[e.paidBy].paid += e.amount;
    } else if(e.type==='transfer'){
      if(bal[e.from]) bal[e.from].given += e.amount;
      if(bal[e.to]) bal[e.to].received += e.amount;
    }
  });
  people.forEach(p=>{
    const b = bal[p];
    b.net = round2(b.paid + b.given - b.received);
  });
  return bal;
}
function categoryTotals(entries){
  const totals = {};
  entries.filter(e=>e.type==='spend').forEach(e=>{
    e.categories.forEach(c=>{ totals[c.name] = round2((totals[c.name]||0) + c.amount); });
  });
  return totals;
}

/* ---------------- actions ---------------- */
function pickPerson(name){
  state.currentPerson = name;
  localStorage.setItem('ledger_person', name);
  state.screen = 'projectList';
  render();
}
function switchPerson(){
  state.currentPerson = null;
  localStorage.removeItem('ledger_person');
  state.screen = 'personPicker';
  render();
}
function openProject(id){
  state.currentProjectId = id;
  attachEntriesListener(id);
  state.screen = 'project';
  state.tab = 'entry';
  state.form = blankSpendForm();
  render();
}
function backToProjects(){
  if(entriesUnsub){ entriesUnsub(); entriesUnsub=null; }
  state.screen = 'projectList';
  state.currentProjectId = null;
  state.entries = [];
  render();
}
function goNewProject(){
  state.form = { name:'', preset:'Holiday', people: [state.currentPerson] };
  state.errors = {};
  state.screen = 'newProject';
  render();
}
async function createProject(){
  const f = state.form;
  const errs = {};
  if(!f.name || !f.name.trim()) errs.name = 'Give this project a name.';
  if(!f.people || f.people.length===0) errs.people = 'Choose who is spending on this project.';
  state.errors = errs;
  if(Object.keys(errs).length){ render(); return; }
  const project = {
    name: f.name.trim(),
    people: f.people,
    categories: PRESETS[f.preset].slice(),
    createdAtMs: Date.now()
  };
  try{
    const ref = await addDoc(collection(db,'projects'), project);
    openProject(ref.id);
  }catch(err){
    state.errors = { general: 'Could not save the project. Check your connection and try again.' };
    render();
  }
}
function blankSpendForm(){
  const project = currentProject();
  return {
    type:'spend',
    date: todayStr(),
    paidBy: project ? (project.people.includes(state.currentPerson) ? state.currentPerson : project.people[0]) : null,
    amount: '',
    catMode: 1,
    cats: [{name:'', amount:''},{name:'', amount:''},{name:'', amount:''}],
    notes: '',
    from: project ? project.people[0] : null,
    to: project ? (project.people[1]||project.people[0]) : null,
  };
}
function setTab(t){ state.tab=t; state.drilldownCategory=null; state.form = blankSpendForm(); state.editingEntryId=null; state.errors={}; render(); }
function setFormType(type){ state.form.type = type; state.errors={}; render(); }

function validateSpend(f, project){
  const errs = {};
  const amt = parseFloat(f.amount);
  if(!f.date) errs.date = 'Pick a date.';
  if(!amt || amt<=0) errs.amount = 'Enter an amount greater than zero.';
  if(!f.paidBy) errs.paidBy = 'Choose who paid.';
  const activeCats = f.cats.slice(0,f.catMode).filter(c=>c.name);
  if(activeCats.length===0) errs.cats = 'Choose at least one category.';
  if(amt>0 && f.catMode>1){
    const sum = round2(activeCats.reduce((s,c)=>s+(parseFloat(c.amount)||0),0));
    if(Math.abs(sum-amt)>0.01) errs.cats = 'Category amounts must add up to the total ('+money(amt)+'). Currently '+money(sum)+'.';
  }
  return errs;
}

async function submitSpend(){
  const project = currentProject();
  const f = state.form;
  const errs = validateSpend(f, project);
  state.errors = errs;
  if(Object.keys(errs).length){ render(); return; }
  const amount = round2(parseFloat(f.amount));
  let cats;
  if(f.catMode===1){
    cats = [{name:f.cats[0].name, amount}];
  } else {
    cats = f.cats.slice(0,f.catMode).filter(c=>c.name).map(c=>({name:c.name, amount:round2(parseFloat(c.amount)||0)}));
  }
  const entry = {
    type:'spend',
    date: f.date,
    paidBy: f.paidBy,
    amount,
    categories: cats,
    notes: f.notes||'',
    createdAtMs: state.editingEntryId ? (state.entries.find(e=>e.id===state.editingEntryId)?.createdAtMs || Date.now()) : Date.now()
  };
  try{
    if(state.editingEntryId){
      await updateDoc(doc(db,'projects',project.id,'entries',state.editingEntryId), entry);
    } else {
      await addDoc(collection(db,'projects',project.id,'entries'), entry);
    }
    state.editingEntryId = null;
    state.form = blankSpendForm();
    state.errors = {};
  }catch(err){
    state.errors = { general: 'Could not save. Check your connection and try again.' };
  }
  render();
}

async function submitTransfer(){
  const project = currentProject();
  const f = state.form;
  const errs = {};
  const amt = parseFloat(f.amount);
  if(!f.date) errs.date = 'Pick a date.';
  if(!amt || amt<=0) errs.amount = 'Enter an amount greater than zero.';
  if(!f.from || !f.to || f.from===f.to) errs.people = 'Choose two different people.';
  state.errors = errs;
  if(Object.keys(errs).length){ render(); return; }
  const entry = {
    type:'transfer',
    date: f.date,
    from: f.from,
    to: f.to,
    amount: round2(amt),
    notes: f.notes||'',
    createdAtMs: state.editingEntryId ? (state.entries.find(e=>e.id===state.editingEntryId)?.createdAtMs || Date.now()) : Date.now()
  };
  try{
    if(state.editingEntryId){
      await updateDoc(doc(db,'projects',project.id,'entries',state.editingEntryId), entry);
    } else {
      await addDoc(collection(db,'projects',project.id,'entries'), entry);
    }
    state.editingEntryId = null;
    state.form = blankSpendForm();
    state.errors = {};
  }catch(err){
    state.errors = { general: 'Could not save. Check your connection and try again.' };
  }
  render();
}

function editEntry(id){
  const e = state.entries.find(x=>x.id===id);
  if(!e) return;
  state.editingEntryId = id;
  if(e.type==='spend'){
    const cats = e.categories.map(c=>({name:c.name, amount:String(c.amount)}));
    while(cats.length<3) cats.push({name:'',amount:''});
    state.form = {
      type:'spend', date:e.date, paidBy:e.paidBy, amount:String(e.amount),
      catMode: e.categories.length, cats, notes:e.notes
    };
  } else {
    state.form = { type:'transfer', date:e.date, from:e.from, to:e.to, amount:String(e.amount), notes:e.notes };
  }
  state.errors = {};
  state.tab = 'entry';
  render();
}
function askDelete(id){ state.confirmDelete = id; render(); }
function cancelDelete(){ state.confirmDelete = null; render(); }
async function confirmDeleteEntry(){
  const project = currentProject();
  try{ await deleteDoc(doc(db,'projects',project.id,'entries',state.confirmDelete)); }
  catch(err){ console.error(err); }
  state.confirmDelete = null;
  render();
}

async function addCategory(name){
  const project = currentProject();
  if(!name || !name.trim()) return;
  if(project.categories.includes(name.trim())) return;
  const updated = project.categories.concat([name.trim()]);
  try{ await updateDoc(doc(db,'projects',project.id), {categories: updated}); }
  catch(err){ console.error(err); }
}
async function removeCategory(name){
  const project = currentProject();
  const updated = project.categories.filter(c=>c!==name);
  try{ await updateDoc(doc(db,'projects',project.id), {categories: updated}); }
  catch(err){ console.error(err); }
}

function csvCell(s){
  const str = String(s??'');
  return /[",\n]/.test(str) ? '"'+str.replace(/"/g,'""')+'"' : str;
}
function exportCsv(){
  const project = currentProject();
  const bal = calcBalances(project, state.entries);
  const catTotals = categoryTotals(state.entries);
  const totalSpend = round2(Object.values(catTotals).reduce((s,v)=>s+v,0));

  const rows = [];
  rows.push(['Project', project.name]);
  rows.push(['Exported', new Date().toISOString().slice(0,19).replace('T',' ')]);
  rows.push([]);

  rows.push(['TRANSACTION LOG']);
  rows.push(['Date','Type','Person / From','To','Amount (GBP)','Categories','Notes']);
  state.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    if(e.type==='spend'){
      const catStr = e.categories.map(c=>c.name+':'+c.amount.toFixed(2)).join('; ');
      rows.push([e.date,'Spend',e.paidBy,'',e.amount.toFixed(2),catStr, (e.notes||'').replace(/[\r\n]+/g,' ')]);
    } else {
      rows.push([e.date,'Transfer',e.from,e.to,e.amount.toFixed(2),'', (e.notes||'').replace(/[\r\n]+/g,' ')]);
    }
  });
  rows.push([]);

  rows.push(['SUMMARY BY CATEGORY']);
  rows.push(['Category','Total (GBP)']);
  Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).forEach(([name,amt])=>{
    rows.push([name, amt.toFixed(2)]);
  });
  rows.push(['Total spend', totalSpend.toFixed(2)]);
  rows.push([]);

  if(project.people.length>1){
    rows.push(['SUMMARY BY PERSON']);
    rows.push(['Person','Spent (GBP)','Given (GBP)','Received (GBP)','Net put in (GBP)']);
    project.people.forEach(p=>{
      const b = bal[p];
      rows.push([p, b.paid.toFixed(2), b.given.toFixed(2), b.received.toFixed(2), b.net.toFixed(2)]);
    });
    rows.push([]);
  }

  const csv = rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = project.name.replace(/[^a-z0-9]+/gi,'_') + '_export.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------------- rendering ---------------- */
function render(){
  const app = document.getElementById('app');
  let html = '';
  if(state.screen==='personPicker') html = renderPersonPicker();
  else if(state.screen==='projectList') html = renderProjectList();
  else if(state.screen==='newProject') html = renderNewProject();
  else if(state.screen==='project') html = renderProjectScreen();
  app.innerHTML = html;
  attachDynamicHandlers();
}

    </div>
    <div class="content">

}

function renderProjectList(){

function renderProjectScreen(){
  const project = currentProject();
  if(!project){
    return `<div class="content"><div class="empty"><h3>Loading…</h3></div></div>`;
  }
  const tabs = [
    ['entry','Log'],['summary','Summary'],['categories','Categories'],['export','Export']
  ];
  return `
    <div class="topbar">
      <div class="brand">
        <button class="link-btn" onclick="backToProjects()" style="margin-right:6px;">←</button>
        <h1 style="font-size:19px;">${esc(project.name)}</h1>
      </div>
      <div class="person-pill" onclick="switchPerson()">
        <span class="dot" style="background:${state.currentPerson==='Tim'?'var(--tim)':'var(--wendy)'}"></span>

    </div>
    <div class="content">
      ${state.tab==='entry' ? renderEntryTab(project) : ''}
      ${state.tab==='summary' ? renderSummaryTab(project) : ''}
      ${state.tab==='categories' ? renderCategoriesTab(project) : ''}

function renderDeleteConfirm(){
  if(!state.confirmDelete) return '';
  return `
  <div class="modal-backdrop" onclick="if(event.target===this) cancelDelete()">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 style="margin-bottom:10px;">Delete this entry?</h3>
      <p class="hint" style="margin-bottom:16px;">This can't be undone.</p>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" style="flex:1;" onclick="cancelDelete()">Cancel</button>
        <button class="btn btn-danger" style="flex:1;" onclick="confirmDeleteEntry()">Delete</button>
      </div>
    </div>
  </div>`;
}

function renderEntryTab(project){
  const f = state.form;
  const isSpend = f.type==='spend';
  const recent = state.entries.slice(0,8);
  return `
    ${state.errors.general?`<div class="error-box">${state.errors.general}</div>`:''}
    <div class="toggle-group">
      <div class="toggle-opt ${isSpend?'active':''}" onclick="setFormType('spend')">Spend</div>
      <div class="toggle-opt ${!isSpend?'active':''}" onclick="setFormType('transfer')">Cash transfer</div>
    </div>
    <div class="card">
      ${isSpend ? renderSpendForm(project, f) : renderTransferForm(project, f)}

    <h3 style="font-size:15px; margin: 18px 0 8px;">Recent entries</h3>
    ${recent.length===0 ? `<div class="empty" style="padding:20px;"><p>No entries yet. Log your first spend above.</p></div>` : recent.map(e=>renderEntryRow(e)).join('')}

}

function renderSpendForm(project, f){
  return `
    <div class="field-row">
      <div><label>Date</label><input type="date" id="f-date" value="${f.date}"></div>
      <div><label>Amount (£)</label><input type="number" id="f-amount" step="0.01" min="0" placeholder="0.00" value="${esc(f.amount)}"></div>
    </div>
    ${state.errors.date?`<div class="error-box">${state.errors.date}</div>`:''}
    ${state.errors.amount?`<div class="error-box">${state.errors.amount}</div>`:''}

    <label>Paid by</label>
    <div>${project.people.map(p=>`<span class="chip ${f.paidBy===p?'selected':''}" onclick="setSpendField('paidBy','${p}')">${p}</span>`).join('')}</div>
    ${state.errors.paidBy?`<div class="error-box">${state.errors.paidBy}</div>`:''}

    <label style="margin-top:10px;">Category</label>
    <div class="toggle-group">
      <div class="toggle-opt ${f.catMode===1?'active':''}" onclick="setCatMode(1)">One category</div>
      <div class="toggle-opt ${f.catMode===2?'active':''}" onclick="setCatMode(2)">Split 2</div>
      <div class="toggle-opt ${f.catMode===3?'active':''}" onclick="setCatMode(3)">Split 3</div>
    </div>
    ${Array.from({length:f.catMode}).map((_,i)=>`
      <div class="field-row">
        <div style="flex:2;">
          <select data-cat-name="${i}">
            <option value="">Choose category…</option>
            ${project.categories.map(c=>`<option value="${esc(c)}" ${f.cats[i].name===c?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        ${f.catMode>1 ? `<div style="flex:1;"><input type="number" step="0.01" placeholder="£ amount" data-cat-amount="${i}" value="${esc(f.cats[i].amount)}"></div>` : ''}
      </div>
    `).join('')}

    <label>Notes (optional)</label>
    <textarea id="f-notes" rows="2" placeholder="Anything worth remembering about this one">${esc(f.notes||'')}</textarea>

    <button class="btn btn-primary btn-block" onclick="submitSpend()">${state.editingEntryId?'Save changes':'Add spend'}</button>
    ${state.editingEntryId?`<button class="btn btn-ghost btn-block" onclick="setTab('entry')" style="margin-top:6px;">Cancel edit</button>`:''}

function renderTransferForm(project, f){
  return `
    <div class="field-row">
      <div><label>Date</label><input type="date" id="f-date" value="${f.date}"></div>
      <div><label>Amount (£)</label><input type="number" id="f-amount" step="0.01" min="0" placeholder="0.00" value="${esc(f.amount)}"></div>

function renderEntryRow(e){
  const isSpend = e.type==='spend';
  const personColor = (p)=> p==='Tim' ? 'var(--tim)' : (p==='Wendy' ? 'var(--wendy)' : 'var(--ink-soft)');
  return `
    <div class="entry-row">
      <div class="entry-left">
        <div class="entry-date">${e.date}</div>
        <div style="margin-top:3px;">
          <span class="badge" style="background:${isSpend?'var(--tim-soft)':'#eee'}; color:${isSpend?'var(--tim)':'var(--ink-soft)'};">${isSpend?'SPEND':'TRANSFER'}</span>
        </div>
        <div class="entry-meta">
          ${isSpend ? `<span style="color:${personColor(e.paidBy)}; font-weight:600;">${e.paidBy}</span> paid · ${e.categories.map(c=>esc(c.name)).join(', ')}` : `<span style="color:${personColor(e.from)}; font-weight:600;">${e.from}</span> → <span style="color:${personColor(e.to)}; font-weight:600;">${e.to}</span>`}
        </div>
        ${e.notes?`<div class="hint" style="margin:3px 0 0;">${esc(e.notes)}</div>`:''}
      </div>
      <div style="text-align:right;">
        <div class="entry-amount">${money(e.amount)}</div>
        <div style="margin-top:6px;">
          <span class="link-btn" onclick="editEntry('${e.id}')">Edit</span>
          &nbsp;·&nbsp;
          <span class="link-btn" style="color:var(--owe);" onclick="askDelete('${e.id}')">Delete</span>
        </div>
      </div>
    </div>
  `;
}

function renderSummaryTab(project){
  const bal = calcBalances(project, state.entries);
  const catTotals = categoryTotals(state.entries);
  const totalSpend = round2(Object.values(catTotals).reduce((s,v)=>s+v,0));
  const sortedCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);

  if(state.drilldownCategory){
    const cat = state.drilldownCategory;
    const txns = state.entries.filter(e=>e.type==='spend' && e.categories.some(c=>c.name===cat));
    return `
      <div class="row-between" style="margin-bottom:10px;">
        <h2 style="font-size:20px;">${esc(cat)}</h2>
        <span class="link-btn" onclick="closeDrilldown()">← All categories</span>
      </div>
      ${txns.length===0?`<div class="empty"><p>No transactions in this category.</p></div>`:txns.map(e=>{
        const catAmt = e.categories.find(c=>c.name===cat).amount;
        return `<div class="entry-row">
          <div class="entry-left">
            <div class="entry-date">${e.date}</div>
            <div class="entry-meta">${e.paidBy} paid${e.categories.length>1?' (this category: '+money(catAmt)+' of '+money(e.amount)+')':''}</div>
            ${e.notes?`<div class="hint">${esc(e.notes)}</div>`:''}
          </div>
          <div class="entry-amount">${money(catAmt)}</div>
        </div>`;
      }).join('')}
    `;
  }

  return `
    <div class="screen-title" style="font-size:20px;">Summary</div>
    <div class="tape">
      <div class="tape-total"><span>Total spend</span><span class="mono">${money(totalSpend)}</span></div>
      ${sortedCats.map(([name,amt])=>`
        <div class="tape-row" onclick="openDrilldown('${esc(name).replace(/'/g,"\\'")}')">
          <span class="tape-cat">${esc(name)}</span>
          <span class="tape-amt">${money(amt)} →</span>
        </div>
      `).join('')}
      ${sortedCats.length===0?`<div class="tape-row"><span class="hint">No spend logged yet.</span></div>`:''}
    </div>

    ${project.people.length>1 ? `
    <h3 style="font-size:15px; margin-bottom:8px;">By person</h3>
    <table class="summary-table">
      <thead><tr><th>Person</th><th>Spent</th><th>Given</th><th>Received</th><th>Net put in</th></tr></thead>
      <tbody>
        ${project.people.map(p=>{
          const b = bal[p];
          return `<tr><td class="name">${p}</td><td>${money(b.paid)}</td><td>${money(b.given)}</td><td>${money(b.received)}</td><td class="mono">${money(b.net)}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="hint" style="margin-top:10px;">"Net put in" is what each person has spent plus cash transfers given, minus cash received — not a shared debt, just their own running contribution.</div>
    ` : ''}
  `;
}

function renderCategoriesTab(project){
  return `
    <div class="screen-title" style="font-size:20px;">Categories</div>
    <div class="screen-sub">Add, or remove ones you don't use for this project.</div>
    <div class="card">
      ${project.categories.map(c=>`
        <div class="row-between" style="padding:8px 0; border-bottom:1px solid var(--paper-line);">
          <span>${esc(c)}</span>
          <span class="link-btn" style="color:var(--owe);" onclick="removeCategory('${esc(c).replace(/'/g,"\\'")}')">Remove</span>
        </div>
      `).join('')}
    </div>
    <label>Add a category</label>
    <div class="field-row">
      <input type="text" id="new-cat-name" placeholder="e.g. Insurance">
      <button class="btn btn-secondary" style="flex:0 0 auto;" onclick="submitNewCategory()">Add</button>

}

function renderExportTab(project){
  return `
    <div class="screen-title" style="font-size:20px;">Export</div>
    <div class="screen-sub">Download every entry in ${esc(project.name)}, plus the category and person summaries, as one CSV file.</div>
    <div class="card">
      <p style="margin:0 0 14px; font-size:14px; color:var(--ink-soft);">This saves a .csv file to your device's Downloads, with three sections: the full transaction log, totals by category, and (if there's more than one person) totals by person. On iPhone, tap Share after it downloads to save it into your OneDrive folder; on a PC, move or drag it into your OneDrive-synced folder afterwards.</p>
      <button class="btn btn-primary btn-block" onclick="exportCsv()">Download CSV</button>
    </div>
  `;
}

/* ---------------- dynamic field handlers ---------------- */
function toggleNewProjectPerson(p){
  const f = state.form;
  if(f.people.includes(p)) f.people = f.people.filter(x=>x!==p);
  else f.people = f.people.concat([p]);
  render();
}
function setSpendField(field, value){ state.form[field]=value; render(); }
function setCatMode(n){ state.form.catMode = n; render(); }
function openDrilldown(name){ state.drilldownCategory = name; render(); }
function closeDrilldown(){ state.drilldownCategory = null; render(); }
function submitNewCategory(){
  const input = document.getElementById('new-cat-name');
  if(input && input.value.trim()){ addCategory(input.value.trim()); }
}

function attachDynamicHandlers(){
  const nameInput = document.getElementById('np-name');
  if(nameInput) nameInput.oninput = (e)=>{ state.form.name = e.target.value; };
  const presetSel = document.getElementById('np-preset');
  if(presetSel) presetSel.onchange = (e)=>{ state.form.preset = e.target.value; };

  const dateInput = document.getElementById('f-date');
  if(dateInput) dateInput.onchange = (e)=>{ state.form.date = e.target.value; };
  const amountInput = document.getElementById('f-amount');
  if(amountInput) amountInput.oninput = (e)=>{ state.form.amount = e.target.value; };
  const notesInput = document.getElementById('f-notes');
  if(notesInput) notesInput.oninput = (e)=>{ state.form.notes = e.target.value; };

  document.querySelectorAll('[data-cat-name]').forEach(el=>{
    el.onchange = (e)=>{
      const i = parseInt(el.getAttribute('data-cat-name'));
      state.form.cats[i].name = e.target.value;
    };
  });
  document.querySelectorAll('[data-cat-amount]').forEach(el=>{
    el.oninput = (e)=>{
      const i = parseInt(el.getAttribute('data-cat-amount'));
      state.form.cats[i].amount = e.target.value;
    };
  });
}

/* expose handlers used by inline onclick */
window.pickPerson = pickPerson;
window.switchPerson = switchPerson;
window.openProject = openProject;
window.backToProjects = backToProjects;
window.goNewProject = goNewProject;
window.createProject = createProject;
window.setTab = setTab;
window.setFormType = setFormType;
window.submitSpend = submitSpend;
window.submitTransfer = submitTransfer;
window.editEntry = editEntry;
window.askDelete = askDelete;
window.cancelDelete = cancelDelete;
window.confirmDeleteEntry = confirmDeleteEntry;
window.removeCategory = removeCategory;
window.submitNewCategory = submitNewCategory;
window.exportCsv = exportCsv;
window.toggleNewProjectPerson = toggleNewProjectPerson;
window.setSpendField = setSpendField;
window.setCatMode = setCatMode;
window.openDrilldown = openDrilldown;
window.closeDrilldown = closeDrilldown;

render();
</script>
